name: Deploy Frontend and Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      
      - name: Install backend dependencies
        run: npm ci --prefix backend
      
      - name: Install frontend dependencies
        run: npm ci --prefix frontend
      
      - name: Build frontend
        env:
          VITE_API_URL: https://real-time-expert-session-booking-system-mlsz.onrender.com/api
          VITE_SOCKET_URL: https://real-time-expert-session-booking-system-mlsz.onrender.com
        run: npm run build --prefix frontend

  deploy-frontend-vercel:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_URL: https://real-time-expert-session-booking-system-mlsz.onrender.com/api
          VITE_SOCKET_URL: https://real-time-expert-session-booking-system-mlsz.onrender.com
        run: npm run build

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
      
      - name: Announce Vercel deployment
        run: echo "✅ Frontend deployed to Vercel"

  deploy-backend-render:
    name: Deploy Backend on Render
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Verify backend code
        working-directory: backend
        run: |
          ls -la
          cat package.json | grep -A 5 '"scripts"'
      
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "⚠️  Missing secret: RENDER_DEPLOY_HOOK_URL"
            echo "Please add RENDER_DEPLOY_HOOK_URL to GitHub secrets"
            exit 1
          fi
          echo "🚀 Triggering Render deployment..."
          curl --fail --show-error --silent -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "✅ Render deployment triggered"

